app:
  storage:
    max-size: 999999
    allowed-extensions:
      - pdf
      - png
      - jpg
      - jpeg
      - gif
      - doc
      - docx
      - ppt
      - pptx
      - xls
      - xlsx
      - txt
      - json
    type: local
    local:
      path: storage
    vfs:
      temporary-ttl-minutes: 60
      cleanup-interval-ms: 300000
      cleanup-initial-delay-ms: 60000

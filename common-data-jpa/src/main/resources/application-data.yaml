spring:
  sql:
    init:
      mode: never
      encoding: utf-8
  datasource:
    hikari:
      maximum-pool-size: ${app.jpa.hikari.maximum-pool-size}
      minimum-idle: ${app.jpa.hikari.minimum-idle}
      connection-timeout: ${app.jpa.hikari.connection-timeout}
      validation-timeout: ${app.jpa.hikari.validation-timeout}
      idle-timeout: ${app.jpa.hikari.idle-timeout}
      max-lifetime: ${app.jpa.hikari.max-lifetime}
      keepalive-time: ${app.jpa.hikari.keepalive-time}
      leak-detection-threshold: 10000
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        check_constraints: false
        check_nullability: false
        default_batch_fetch_size: 128
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
          fetch_size: 128
          time_zone: Asia/Shanghai
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
        generate_statistics: false
decorator:
  datasource:
    enabled: true
    datasource-proxy:
      multiline: true
      format-sql: true
      query:
        enable-logging: false

app:
  jpa:
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 2000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1740000
      keepalive-time: 300000
    slow-query:
      enabled: true
      threshold: 95ms

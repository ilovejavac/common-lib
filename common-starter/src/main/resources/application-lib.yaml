spring:
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  mvc:
    static-path-pattern: /static/**
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 120MB
      file-size-threshold: 2MB
      resolve-lazily: false
    encoding: # springboot4
      charset: utf-8
      enabled: true
      force-response: true
      force: true
  web:
    resources:
      add-mappings: false
    error: # springboot4
      include-message: never
      include-stacktrace: never
      include-exception: false
      whitelabel:
        enabled: false

server:
  shutdown: graceful
  tomcat:
    max-connections: 10000
    accept-count: 1000
    connection-timeout: 5s
    keep-alive-timeout: 20s
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB
  http2:
    enabled: true
  compression:
    enabled: true
    mime-types:
      - application/json
      - text/html
      - text/css
      - application/javascript
      - image/svg+xml
    min-response-size: 1KB

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
        exclude: shutdown
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name:application}

app:
  cors:
    allowed-origins: []
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    max-age: 1800
    allow-credentials: false
